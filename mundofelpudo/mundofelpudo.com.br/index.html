  <script>
    // Remove botao grupo WhatsApp via MutationObserver
    function removerBotaoWhatsApp() {
      document.querySelectorAll('a, button, div').forEach(function(el) {
        if (el.innerText && el.innerText.includes('grupo do WhatsApp')) {
          el.style.display = 'none';
        }
      });
    }
    const observer = new MutationObserver(removerBotaoWhatsApp);
    observer.observe(document.body, { childList: true, subtree: true });
    document.addEventListener('DOMContentLoaded', removerBotaoWhatsApp);
  </script>
